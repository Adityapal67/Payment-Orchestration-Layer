spring.application.name=PaymentOrchestrator

spring.datasource.url=jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1908

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

gateway.razorpay.latency-ms=200
gateway.razorpay.success-rate=0.90
gateway.razorpay.timeout-rate=0.02
gateway.razorpay.max-latency-ms=3000

gateway.stripe.latency-ms=1500
gateway.stripe.success-rate=0.60
gateway.stripe.timeout-rate=0.10
gateway.stripe.max-latency-ms=3000


gateway.upi.latency-ms=100
gateway.upi.success-rate=0.95
gateway.upi.timeout-rate=0.01
gateway.upi.max-latency-ms=3000

routing.weight.success=0.7
routing.weight.latency=0.3
routing.max-latency=1000

circuit.success-threshold=0.6
# Part 1: minimum outcomes in the window before the circuit is allowed to open
circuit.min-samples=5
# Part 6: how long a gateway stays OPEN before it is eligible for a HALF_OPEN probe
circuit.cooldown-ms=30000
# Part 6: probability a HALF_OPEN gateway is picked as a probe request
circuit.halfopen.probe-probability=0.1

# Part 4: chance that a "timed out" gateway call actually succeeded on the gateway side
timeout.investigation.success-probability=0.5